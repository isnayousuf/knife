<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knife</title>
    <style>
        main{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
        }
        .handle{
            width:25rem;
            height: 3.5rem;
            border: 40px solid burlywood;
            border-radius:  1rem 1rem 5rem 1rem;
            margin-left: 25rem;
            background: linear-gradient(45deg, burlywood 0%,rgb(170, 141, 68) 25%, rgb(216, 182, 118) 50%,  burlywood 100% );
            box-shadow: 10px 10px 10px gray;
            position: relative;

        }
        .handle::before{
            content: '';
            width: 28rem;
            height: 5rem;
            border: 2px solid rgb(112, 104, 104);
            background: linear-gradient(90deg, #787878 0%, #b5b5b5 25%, #e3e3e3 50%, #b5b5b5 75%, #787878 100%);
            position: absolute;
            left: -120%;
            top: -0.7rem;
            border-radius: 12px 0 10px 100% ;
            box-shadow: 10px 10px 10px gray ;
            z-index: -1;
        
        }
        .handle::after{
            content: '';
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            border: 2px solid gray;
            background: linear-gradient(90deg, #787878 0%, #b5b5b5 25%, #e3e3e3 50%, #b5b5b5 75%, #787878 100%);
            position: absolute;
             left: -1rem;
             bottom: 3.3rem;
            
            
        }
        .screw{
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            border: 2px solid gray;
            background: linear-gradient(90deg, #787878 0%, #b5b5b5 25%, #e3e3e3 50%, #b5b5b5 75%, #787878 100%);
            position: absolute;
            top: 3rem;
            left: -0.8rem;
        }
        .screw::after{
            content: '';
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            border: 2px solid gray;
            background: linear-gradient(90deg, #787878 0%, #b5b5b5 25%, #e3e3e3 50%, #b5b5b5 75%, #787878 100%);
            position: absolute;
            left: 25rem;
            bottom: 3rem;
             
            
            
        }
    </style>
</head>
<body>
    <main>
        <div class="handle">
            <div class="screw"></div>
        </div>
       
    </main>
    
</body>
</html>
